<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 1300" font-family="sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="triangle-empty" markerWidth="16" markerHeight="12" refX="16" refY="6" orient="auto">
      <polygon points="0 0, 16 6, 0 12" fill="white" stroke="#333" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- ===================================================== -->
  <!--  MAIN ENTITIES (TOP + MIDDLE)                         -->
  <!-- ===================================================== -->

  <!-- Type -->
  <rect x="40" y="40" width="250" height="105" rx="5" fill="#e8f4fd" stroke="#333" stroke-width="1.5"/>
  <rect x="40" y="40" width="250" height="30" rx="5" fill="#4a90d9" stroke="#333" stroke-width="1.5"/>
  <text x="165" y="60" text-anchor="middle" fill="white" font-weight="bold" font-size="15">Type</text>
  <line x1="40" y1="70" x2="290" y2="70" stroke="#333"/>
  <text x="55" y="92"><tspan text-decoration="underline">type_id</tspan> : INT</text>
  <text x="55" y="112">name : VARCHAR(20)</text>
  <text x="55" y="132">{unique: name}</text>

  <!-- Pokemon -->
  <rect x="420" y="40" width="320" height="145" rx="5" fill="#e8f4fd" stroke="#333" stroke-width="1.5"/>
  <rect x="420" y="40" width="320" height="30" rx="5" fill="#4a90d9" stroke="#333" stroke-width="1.5"/>
  <text x="580" y="60" text-anchor="middle" fill="white" font-weight="bold" font-size="15">Pokemon</text>
  <line x1="420" y1="70" x2="740" y2="70" stroke="#333"/>
  <text x="435" y="92"><tspan text-decoration="underline">pokedex_no</tspan> : INT</text>
  <text x="435" y="112">name : VARCHAR(40)</text>
  <text x="435" y="132">height : DECIMAL(4,1)</text>
  <text x="435" y="152">weight : DECIMAL(6,1)</text>
  <text x="435" y="172">evolves_from : INT [0..1]</text>

  <!-- Trainer -->
  <rect x="1120" y="40" width="300" height="130" rx="5" fill="#e8f4fd" stroke="#333" stroke-width="1.5"/>
  <rect x="1120" y="40" width="300" height="30" rx="5" fill="#4a90d9" stroke="#333" stroke-width="1.5"/>
  <text x="1270" y="60" text-anchor="middle" fill="white" font-weight="bold" font-size="15">Trainer</text>
  <line x1="1120" y1="70" x2="1420" y2="70" stroke="#333"/>
  <text x="1135" y="92"><tspan text-decoration="underline">trainer_id</tspan> : INT</text>
  <text x="1135" y="112">name : VARCHAR(60)</text>
  <text x="1135" y="132">birth_date : DATE [0..1]</text>
  <text x="1135" y="152">region : VARCHAR(30) [0..1]</text>

  <!-- Move -->
  <rect x="40" y="280" width="290" height="165" rx="5" fill="#e8f4fd" stroke="#333" stroke-width="1.5"/>
  <rect x="40" y="280" width="290" height="30" rx="5" fill="#4a90d9" stroke="#333" stroke-width="1.5"/>
  <text x="185" y="300" text-anchor="middle" fill="white" font-weight="bold" font-size="15">Move</text>
  <line x1="40" y1="310" x2="330" y2="310" stroke="#333"/>
  <text x="55" y="332"><tspan text-decoration="underline">move_id</tspan> : INT</text>
  <text x="55" y="352">name : VARCHAR(40)</text>
  <text x="55" y="372">power : INT [0..1]</text>
  <text x="55" y="392">accuracy : INT</text>
  <text x="55" y="412">pp : INT</text>
  <text x="55" y="432">category : {Physical, Special, Status}</text>

  <!-- Team (weak) -->
  <rect x="1116" y="276" width="308" height="98" rx="5" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="6,3"/>
  <rect x="1120" y="280" width="300" height="90" rx="5" fill="#fff3e0" stroke="#333" stroke-width="2"/>
  <rect x="1120" y="280" width="300" height="30" rx="5" fill="#e6a817" stroke="#333" stroke-width="2"/>
  <text x="1270" y="300" text-anchor="middle" fill="white" font-weight="bold" font-size="15">Team «weak»</text>
  <line x1="1120" y1="310" x2="1420" y2="310" stroke="#333"/>
  <text x="1135" y="332"><tspan text-decoration="underline" style="text-decoration-style:dashed">team_name</tspan> : VARCHAR(40)</text>
  <text x="1135" y="352">{key: (trainer_id, team_name)}</text>

  <!-- WildPokemon -->
  <rect x="420" y="280" width="320" height="90" rx="5" fill="#e8fde8" stroke="#333" stroke-width="1.5"/>
  <rect x="420" y="280" width="320" height="30" rx="5" fill="#44c944" stroke="#333" stroke-width="1.5"/>
  <text x="580" y="300" text-anchor="middle" fill="white" font-weight="bold" font-size="15">WildPokemon</text>
  <line x1="420" y1="310" x2="740" y2="310" stroke="#333"/>
  <text x="435" y="332">location : VARCHAR(60)</text>
  <text x="435" y="352">level_range : VARCHAR(10)</text>

  <!-- CapturedPokemon -->
  <rect x="760" y="280" width="330" height="130" rx="5" fill="#e8fde8" stroke="#333" stroke-width="1.5"/>
  <rect x="760" y="280" width="330" height="30" rx="5" fill="#44c944" stroke="#333" stroke-width="1.5"/>
  <text x="925" y="300" text-anchor="middle" fill="white" font-weight="bold" font-size="15">CapturedPokemon</text>
  <line x1="760" y1="310" x2="1090" y2="310" stroke="#333"/>
  <text x="775" y="332"><tspan text-decoration="underline">captured_id</tspan> : INT</text>
  <text x="775" y="352">nickname : VARCHAR(40) [0..1]</text>
  <text x="775" y="372">level : INT</text>
  <text x="775" y="392">captured_on : DATE [0..1]</text>

  <!-- Battle -->
  <rect x="1540" y="120" width="380" height="175" rx="5" fill="#e8f4fd" stroke="#333" stroke-width="1.5"/>
  <rect x="1540" y="120" width="380" height="30" rx="5" fill="#4a90d9" stroke="#333" stroke-width="1.5"/>
  <text x="1730" y="140" text-anchor="middle" fill="white" font-weight="bold" font-size="15">Battle</text>
  <line x1="1540" y1="150" x2="1920" y2="150" stroke="#333"/>
  <text x="1555" y="172"><tspan text-decoration="underline">battle_id</tspan> : INT</text>
  <text x="1555" y="192">battle_date : DATE</text>
  <text x="1555" y="212">location : VARCHAR(60) [0..1]</text>
  <text x="1555" y="232">challenger_id : INT (FK)</text>
  <text x="1555" y="252">opponent_id : INT (FK)</text>
  <text x="1555" y="272">result : {challenger, opponent, draw}</text>

  <!-- ===================================================== -->
  <!--  ASSOCIATION TABLES (BOTTOM)                          -->
  <!-- ===================================================== -->

  <!-- PokemonType -->
  <rect x="390" y="620" width="300" height="95" rx="5" fill="#f7f7f7" stroke="#333" stroke-width="1.3"/>
  <rect x="390" y="620" width="300" height="30" rx="5" fill="#a7a7a7" stroke="#333" stroke-width="1.3"/>
  <text x="540" y="640" text-anchor="middle" fill="white" font-weight="bold">PokemonType</text>
  <line x1="390" y1="650" x2="690" y2="650" stroke="#333"/>
  <text x="405" y="672"><tspan text-decoration="underline">pokedex_no</tspan> : INT (FK)</text>
  <text x="405" y="692"><tspan text-decoration="underline">type_id</tspan> : INT (FK)</text>

  <!-- PokemonMove -->
  <rect x="40" y="620" width="330" height="115" rx="5" fill="#f7f7f7" stroke="#333" stroke-width="1.3"/>
  <rect x="40" y="620" width="330" height="30" rx="5" fill="#a7a7a7" stroke="#333" stroke-width="1.3"/>
  <text x="205" y="640" text-anchor="middle" fill="white" font-weight="bold">PokemonMove</text>
  <line x1="40" y1="650" x2="370" y2="650" stroke="#333"/>
  <text x="55" y="672"><tspan text-decoration="underline">pokedex_no</tspan> : INT (FK)</text>
  <text x="55" y="692"><tspan text-decoration="underline">move_id</tspan> : INT (FK)</text>
  <text x="55" y="712">learn_method : VARCHAR(20)</text>

  <!-- TrainerCapturedPokemon -->
  <rect x="700" y="620" width="350" height="110" rx="5" fill="#f7f7f7" stroke="#333" stroke-width="1.3"/>
  <rect x="700" y="620" width="350" height="30" rx="5" fill="#a7a7a7" stroke="#333" stroke-width="1.3"/>
  <text x="875" y="640" text-anchor="middle" fill="white" font-weight="bold">TrainerCapturedPokemon</text>
  <line x1="700" y1="650" x2="1050" y2="650" stroke="#333"/>
  <text x="715" y="672"><tspan text-decoration="underline">trainer_id</tspan> : INT (FK)</text>
  <text x="715" y="692"><tspan text-decoration="underline">captured_id</tspan> : INT (FK, unique)</text>

  <!-- CapturedPokemonSpecies -->
  <rect x="1080" y="620" width="340" height="95" rx="5" fill="#f7f7f7" stroke="#333" stroke-width="1.3"/>
  <rect x="1080" y="620" width="340" height="30" rx="5" fill="#a7a7a7" stroke="#333" stroke-width="1.3"/>
  <text x="1250" y="640" text-anchor="middle" fill="white" font-weight="bold">CapturedPokemonSpecies</text>
  <line x1="1080" y1="650" x2="1420" y2="650" stroke="#333"/>
  <text x="1095" y="672"><tspan text-decoration="underline">captured_id</tspan> : INT (FK)</text>
  <text x="1095" y="692">pokedex_no : INT (FK)</text>

  <!-- CapturedPokemonTeam -->
  <rect x="1460" y="620" width="380" height="135" rx="5" fill="#f7f7f7" stroke="#333" stroke-width="1.3"/>
  <rect x="1460" y="620" width="380" height="30" rx="5" fill="#a7a7a7" stroke="#333" stroke-width="1.3"/>
  <text x="1650" y="640" text-anchor="middle" fill="white" font-weight="bold">CapturedPokemonTeam</text>
  <line x1="1460" y1="650" x2="1840" y2="650" stroke="#333"/>
  <text x="1475" y="672"><tspan text-decoration="underline">captured_id</tspan> : INT (FK)</text>
  <text x="1475" y="692">trainer_id : INT (FK)</text>
  <text x="1475" y="712">team_name : VARCHAR(40) (FK)</text>
  <text x="1475" y="732">position : INT [1..6]</text>

  <!-- ===================================================== -->
  <!--  RELATIONSHIPS                                         -->
  <!-- ===================================================== -->

  <!-- has_type (via PokemonType) -->
  <line x1="290" y1="95" x2="420" y2="95" stroke="#333" stroke-width="1.5"/>
  <text x="350" y="88" font-size="11" fill="#555" text-anchor="middle">has_type</text>
  <text x="302" y="88" font-size="11" fill="#555">0..*</text>
  <text x="402" y="88" font-size="11" fill="#555">1..2</text>

  <line x1="540" y1="620" x2="560" y2="185" stroke="#666" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="540" y1="620" x2="165" y2="145" stroke="#666" stroke-width="1.2" stroke-dasharray="5,3"/>

  <!-- move_type -->
  <line x1="165" y1="145" x2="165" y2="280" stroke="#333" stroke-width="1.5"/>
  <text x="174" y="220" font-size="11" fill="#555" font-style="italic">move_type</text>
  <text x="171" y="163" font-size="11" fill="#555">0..*</text>
  <text x="171" y="272" font-size="11" fill="#555">1</text>

  <!-- can_learn (via PokemonMove) -->
  <line x1="205" y1="620" x2="190" y2="445" stroke="#666" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="205" y1="620" x2="520" y2="185" stroke="#666" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="275" y="575" font-size="11" fill="#555" font-style="italic">can_learn</text>

  <!-- inheritance Pokemon -> WildPokemon -->
  <line x1="580" y1="185" x2="580" y2="280" stroke="#333" stroke-width="1.6" marker-end="url(#triangle-empty)"/>

  <!-- inheritance Pokemon -> CapturedPokemon -->
  <line x1="580" y1="185" x2="900" y2="280" stroke="#333" stroke-width="1.6" marker-end="url(#triangle-empty)"/>

  <!-- evolves_into reflexive -->
    <path d="M 740 85 C 900 70, 900 5, 700 5 C 520 5, 500 20, 500 40"
        stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
    <text x="640" y="24" font-size="11" font-style="italic">evolves_into</text>
    <text x="748" y="78" font-size="11" fill="#555">0..1</text>
    <text x="505" y="56" font-size="11" fill="#555">0..1</text>
    <rect x="805" y="8" width="110" height="22" rx="3" fill="#f5f5f5" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="860" y="23" text-anchor="middle" font-size="10">min_level : INT</text>

  <!-- owns Trainer-Team -->
  <line x1="1270" y1="170" x2="1270" y2="280" stroke="#333" stroke-width="2"/>
  <text x="1278" y="208" font-size="11" fill="#555">1</text>
  <text x="1278" y="272" font-size="11" fill="#555">0..*</text>
  <text x="1288" y="235" font-size="11" font-style="italic">owns</text>

  <!-- owns_captured (via TrainerCapturedPokemon) -->
  <line x1="875" y1="620" x2="1270" y2="170" stroke="#666" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="875" y1="620" x2="925" y2="410" stroke="#666" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="985" y="520" font-size="11" fill="#555" font-style="italic">owns_captured</text>

  <!-- is_species_of (via CapturedPokemonSpecies) -->
  <line x1="1250" y1="620" x2="925" y2="410" stroke="#666" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="1250" y1="620" x2="620" y2="185" stroke="#666" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="1120" y="500" font-size="11" fill="#555" font-style="italic">is_species_of</text>

  <!-- assigned_to_team (via CapturedPokemonTeam) -->
  <line x1="1650" y1="620" x2="930" y2="410" stroke="#666" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="1650" y1="620" x2="1340" y2="370" stroke="#666" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="1650" y1="620" x2="1050" y2="690" stroke="#666" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="1485" y="520" font-size="11" fill="#555" font-style="italic">assigned_to_team</text>

  <!-- fights: Battle-Trainer -->
  <line x1="1540" y1="175" x2="1420" y2="95" stroke="#333" stroke-width="1.5"/>
  <text x="1470" y="128" font-size="11" fill="#555" font-style="italic">challenger</text>
  <text x="1532" y="172" font-size="11" fill="#555">0..*</text>
  <text x="1425" y="106" font-size="11" fill="#555">1</text>

  <line x1="1540" y1="225" x2="1420" y2="115" stroke="#333" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="1460" y="182" font-size="11" fill="#555" font-style="italic">opponent</text>
  <text x="1532" y="222" font-size="11" fill="#555">0..*</text>
  <text x="1425" y="126" font-size="11" fill="#555">1</text>

  <!-- uses_team: Battle-Team -->
  <line x1="1540" y1="272" x2="1420" y2="330" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="1468" y="300" font-size="11" fill="#555" font-style="italic">uses_team</text>
  <text x="1532" y="270" font-size="11" fill="#555">0..*</text>
  <text x="1425" y="338" font-size="11" fill="#555">0..1</text>

  <!-- ===================================================== -->
  <!--  LEGEND                                               -->
  <!-- ===================================================== -->
  <rect x="40" y="980" width="460" height="290" rx="7" fill="#fafafa" stroke="#999"/>
  <text x="60" y="1010" font-size="15" font-weight="bold">Legend</text>

  <line x1="60" y1="1035" x2="100" y2="1035" stroke="#333" stroke-width="1.6" marker-end="url(#triangle-empty)"/>
  <text x="115" y="1040" font-size="12">Inheritance (generalisation)</text>

  <line x1="60" y1="1065" x2="100" y2="1065" stroke="#666" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="115" y="1070" font-size="12">Association table link (FK relation)</text>

  <rect x="60" y="1085" width="40" height="20" rx="2" fill="#fff3e0" stroke="#333" stroke-width="2"/>
  <text x="115" y="1100" font-size="12">Weak entity (double border)</text>

  <path d="M 60 1130 C 80 1120, 90 1140, 100 1130" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="115" y="1135" font-size="12">Reflexive association</text>

  <text x="60" y="1165" font-size="12" text-decoration="underline">underlined</text>
  <text x="140" y="1165" font-size="12">= primary key attribute</text>

  <rect x="60" y="1178" width="40" height="20" rx="2" fill="#a7a7a7" stroke="#333" stroke-width="1.3"/>
  <text x="115" y="1193" font-size="12">Association table</text>

  <rect x="60" y="1210" width="40" height="20" rx="2" fill="#e8fde8" stroke="#333" stroke-width="1.3"/>
  <text x="115" y="1225" font-size="12">Inherited class</text>

  <rect x="60" y="1238" width="40" height="20" rx="2" fill="#fff3e0" stroke="#333" stroke-width="1.3"/>
  <text x="115" y="1253" font-size="12">Weak class</text>
</svg>
