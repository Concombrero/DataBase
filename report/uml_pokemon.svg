<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="diamond" markerWidth="14" markerHeight="10" refX="0" refY="5" orient="auto">
      <polygon points="0 5, 7 0, 14 5, 7 10" fill="#333"/>
    </marker>
    <marker id="diamond-white" markerWidth="14" markerHeight="10" refX="0" refY="5" orient="auto">
      <polygon points="0 5, 7 0, 14 5, 7 10" fill="white" stroke="#333" stroke-width="1"/>
    </marker>
    <marker id="triangle-empty" markerWidth="16" markerHeight="12" refX="16" refY="6" orient="auto">
      <polygon points="0 0, 16 6, 0 12" fill="white" stroke="#333" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- ════════════════════════════════════════ -->
  <!--  CLASS: Type                             -->
  <!-- ════════════════════════════════════════ -->
  <rect x="20" y="20" width="180" height="90" rx="4" fill="#e8f4fd" stroke="#333" stroke-width="1.5"/>
  <rect x="20" y="20" width="180" height="28" rx="4" fill="#4a90d9" stroke="#333" stroke-width="1.5"/>
  <text x="110" y="40" text-anchor="middle" fill="white" font-weight="bold" font-size="14">Type</text>
  <line x1="20" y1="48" x2="200" y2="48" stroke="#333" stroke-width="1"/>
  <text x="30" y="66" font-size="12"><tspan text-decoration="underline">type_id</tspan> : INT</text>
  <text x="30" y="82" font-size="12">name : VARCHAR(20)</text>
  <text x="30" y="98" font-size="12">{unique: name}</text>

  <!-- ════════════════════════════════════════ -->
  <!--  CLASS: Pokemon                          -->
  <!-- ════════════════════════════════════════ -->
  <rect x="350" y="20" width="220" height="120" rx="4" fill="#e8f4fd" stroke="#333" stroke-width="1.5"/>
  <rect x="350" y="20" width="220" height="28" rx="4" fill="#4a90d9" stroke="#333" stroke-width="1.5"/>
  <text x="460" y="40" text-anchor="middle" fill="white" font-weight="bold" font-size="14">Pokemon</text>
  <line x1="350" y1="48" x2="570" y2="48" stroke="#333" stroke-width="1"/>
  <text x="360" y="66" font-size="12"><tspan text-decoration="underline">pokedex_no</tspan> : INT</text>
  <text x="360" y="82" font-size="12">name : VARCHAR(40)</text>
  <text x="360" y="98" font-size="12">height : DECIMAL</text>
  <text x="360" y="114" font-size="12">weight : DECIMAL</text>
  <text x="360" y="130" font-size="12">{unique: name}</text>

  <!-- ════════════════════════════════════════ -->
  <!--  CLASS: Move                             -->
  <!-- ════════════════════════════════════════ -->
  <rect x="20" y="260" width="220" height="140" rx="4" fill="#e8f4fd" stroke="#333" stroke-width="1.5"/>
  <rect x="20" y="260" width="220" height="28" rx="4" fill="#4a90d9" stroke="#333" stroke-width="1.5"/>
  <text x="130" y="280" text-anchor="middle" fill="white" font-weight="bold" font-size="14">Move</text>
  <line x1="20" y1="288" x2="240" y2="288" stroke="#333" stroke-width="1"/>
  <text x="30" y="306" font-size="12"><tspan text-decoration="underline">move_id</tspan> : INT</text>
  <text x="30" y="322" font-size="12">name : VARCHAR(40)</text>
  <text x="30" y="338" font-size="12">power : INT [0..1]</text>
  <text x="30" y="354" font-size="12">accuracy : INT</text>
  <text x="30" y="370" font-size="12">pp : INT</text>
  <text x="30" y="386" font-size="12">category : {Phys, Spec, Stat}</text>

  <!-- ════════════════════════════════════════ -->
  <!--  CLASS: Trainer                          -->
  <!-- ════════════════════════════════════════ -->
  <rect x="700" y="20" width="200" height="110" rx="4" fill="#fde8e8" stroke="#333" stroke-width="1.5"/>
  <rect x="700" y="20" width="200" height="28" rx="4" fill="#d94a4a" stroke="#333" stroke-width="1.5"/>
  <text x="800" y="40" text-anchor="middle" fill="white" font-weight="bold" font-size="14">Trainer</text>
  <line x1="700" y1="48" x2="900" y2="48" stroke="#333" stroke-width="1"/>
  <text x="710" y="66" font-size="12"><tspan text-decoration="underline">trainer_id</tspan> : INT</text>
  <text x="710" y="82" font-size="12">name : VARCHAR(60)</text>
  <text x="710" y="98" font-size="12">birth_date : DATE</text>
  <text x="710" y="114" font-size="12">region : VARCHAR(30)</text>

  <!-- ════════════════════════════════════════ -->
  <!--  CLASS: Team  (WEAK ENTITY)              -->
  <!-- ════════════════════════════════════════ -->
  <!-- Double border for weak entity -->
  <rect x="697" y="257" width="206" height="86" rx="4" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="6,3"/>
  <rect x="700" y="260" width="200" height="80" rx="4" fill="#fff3e0" stroke="#333" stroke-width="2"/>
  <rect x="700" y="260" width="200" height="28" rx="4" fill="#e6a817" stroke="#333" stroke-width="2"/>
  <text x="800" y="280" text-anchor="middle" fill="white" font-weight="bold" font-size="14">Team «weak»</text>
  <line x1="700" y1="288" x2="900" y2="288" stroke="#333" stroke-width="1.5"/>
  <text x="710" y="306" font-size="12"><tspan text-decoration="underline" style="text-decoration-style: dashed">team_name</tspan> : VARCHAR(40)</text>
  <text x="710" y="324" font-size="12">{key: (trainer_id, team_name)}</text>

  <!-- ════════════════════════════════════════ -->
  <!--  SUBCLASS: WildPokemon                   -->
  <!-- ════════════════════════════════════════ -->
  <rect x="280" y="320" width="200" height="90" rx="4" fill="#e8fde8" stroke="#333" stroke-width="1.5"/>
  <rect x="280" y="320" width="200" height="28" rx="4" fill="#4ad94a" stroke="#333" stroke-width="1.5"/>
  <text x="380" y="340" text-anchor="middle" fill="white" font-weight="bold" font-size="14">WildPokemon</text>
  <line x1="280" y1="348" x2="480" y2="348" stroke="#333" stroke-width="1"/>
  <text x="290" y="366" font-size="12">location : VARCHAR(60)</text>
  <text x="290" y="382" font-size="12">level_range : VARCHAR(10)</text>
  <text x="290" y="398" font-size="12">{disjoint, total}</text>

  <!-- ════════════════════════════════════════ -->
  <!--  SUBCLASS: StarterPokemon                -->
  <!-- ════════════════════════════════════════ -->
  <rect x="500" y="320" width="200" height="90" rx="4" fill="#e8fde8" stroke="#333" stroke-width="1.5"/>
  <rect x="500" y="320" width="200" height="28" rx="4" fill="#4ad94a" stroke="#333" stroke-width="1.5"/>
  <text x="600" y="340" text-anchor="middle" fill="white" font-weight="bold" font-size="14">StarterPokemon</text>
  <line x1="500" y1="348" x2="700" y2="348" stroke="#333" stroke-width="1"/>
  <text x="510" y="366" font-size="12">region : VARCHAR(30)</text>
  <text x="510" y="382" font-size="12">generation : INT</text>
  <text x="510" y="398" font-size="12">{disjoint, total}</text>

  <!-- ════════════════════════════════════════ -->
  <!--  INHERITANCE ARROWS  (Pokemon → subs)    -->
  <!-- ════════════════════════════════════════ -->
  <!-- Vertical line from Pokemon down to fork -->
  <line x1="460" y1="140" x2="460" y2="260" stroke="#333" stroke-width="1.5"/>
  <!-- Horizontal bar -->
  <line x1="380" y1="260" x2="600" y2="260" stroke="#333" stroke-width="1.5"/>
  <!-- Down to WildPokemon -->
  <line x1="380" y1="260" x2="380" y2="320" stroke="#333" stroke-width="1.5" marker-end="url(#triangle-empty)"/>
  <!-- Down to StarterPokemon -->
  <line x1="600" y1="260" x2="600" y2="320" stroke="#333" stroke-width="1.5" marker-end="url(#triangle-empty)"/>
  <!-- Label -->
  <text x="470" y="255" font-size="11" fill="#555" font-style="italic">{disjoint, total}</text>

  <!-- ════════════════════════════════════════ -->
  <!--  ASSOCIATION: has_type  Pokemon—Type      -->
  <!-- ════════════════════════════════════════ -->
  <line x1="200" y1="65" x2="350" y2="65" stroke="#333" stroke-width="1.5"/>
  <text x="220" y="58" font-size="11" fill="#555">0..*</text>
  <text x="310" y="58" font-size="11" fill="#555">1..2</text>
  <text x="268" y="80" font-size="11" font-style="italic" text-anchor="middle">has_type</text>

  <!-- ════════════════════════════════════════ -->
  <!--  ASSOCIATION: move_type  Move—Type        -->
  <!-- ════════════════════════════════════════ -->
  <line x1="110" y1="110" x2="110" y2="260" stroke="#333" stroke-width="1.5"/>
  <text x="115" y="130" font-size="11" fill="#555">0..*</text>
  <text x="115" y="255" font-size="11" fill="#555">1</text>
  <text x="125" y="190" font-size="11" font-style="italic">move_type</text>

  <!-- ════════════════════════════════════════ -->
  <!--  ASSOCIATION: can_learn  Pokemon—Move     -->
  <!-- ════════════════════════════════════════ -->
  <line x1="240" y1="330" x2="280" y2="200" stroke="#333" stroke-width="1.5"/>
  <line x1="280" y1="200" x2="350" y2="130" stroke="#333" stroke-width="1.5"/>
  <text x="250" y="310" font-size="11" fill="#555">0..*</text>
  <text x="340" y="145" font-size="11" fill="#555">0..*</text>
  <!-- Association class bubble -->
  <rect x="270" y="200" width="130" height="40" rx="4" fill="#f5f5f5" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="335" y="215" text-anchor="middle" font-size="11" font-weight="bold">can_learn</text>
  <text x="335" y="232" text-anchor="middle" font-size="11">learn_method</text>

  <!-- ════════════════════════════════════════ -->
  <!--  REFLEXIVE: evolves_into  Pokemon—Pokemon -->
  <!-- ════════════════════════════════════════ -->
  <path d="M 570 60 C 640 60, 660 10, 570 10 L 460 10 C 380 10, 380 40, 350 50"
        stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="510" y="8" font-size="11" font-style="italic" text-anchor="middle">evolves_into</text>
  <text x="575" y="55" font-size="11" fill="#555">0..1</text>
  <text x="360" y="55" font-size="11" fill="#555">0..1</text>
  <!-- Association attribute -->
  <rect x="425" y="470" width="120" height="30" rx="3" fill="#f5f5f5" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Actually let's put the evolves_into attribute near the reflexive arc -->
  <rect x="580" y="2" width="100" height="22" rx="3" fill="#f5f5f5" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="630" y="17" text-anchor="middle" font-size="10">min_level : INT</text>

  <!-- ════════════════════════════════════════ -->
  <!--  ASSOCIATION: owns  Trainer—Team          -->
  <!-- ════════════════════════════════════════ -->
  <line x1="800" y1="130" x2="800" y2="260" stroke="#333" stroke-width="2.5"/>
  <text x="808" y="155" font-size="11" fill="#555">1</text>
  <text x="808" y="252" font-size="11" fill="#555">0..*</text>
  <text x="815" y="200" font-size="11" font-style="italic">owns</text>

  <!-- ════════════════════════════════════════ -->
  <!--  ASSOCIATION: team_member  Team—Pokemon   -->
  <!-- ════════════════════════════════════════ -->
  <line x1="700" y1="300" x2="570" y2="120" stroke="#333" stroke-width="1.5"/>
  <text x="685" y="295" font-size="11" fill="#555">0..*</text>
  <text x="572" y="135" font-size="11" fill="#555">1..6</text>
  <!-- Association class bubble -->
  <rect x="600" y="195" width="120" height="40" rx="4" fill="#f5f5f5" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="660" y="210" text-anchor="middle" font-size="11" font-weight="bold">team_member</text>
  <text x="660" y="227" text-anchor="middle" font-size="11">position : 1..6</text>

  <!-- Clean up the stray rectangle from evolves_into -->
  <rect x="425" y="470" width="120" height="30" rx="3" fill="white" stroke="white" stroke-width="2"/>

  <!-- ════════════════════════════════════════ -->
  <!--  CLASS: Battle (fight history)           -->
  <!-- ════════════════════════════════════════ -->
  <rect x="940" y="160" width="230" height="130" rx="4" fill="#f3e8fd" stroke="#333" stroke-width="1.5"/>
  <rect x="940" y="160" width="230" height="28" rx="4" fill="#8a4ad9" stroke="#333" stroke-width="1.5"/>
  <text x="1055" y="180" text-anchor="middle" fill="white" font-weight="bold" font-size="14">Battle</text>
  <line x1="940" y1="188" x2="1170" y2="188" stroke="#333" stroke-width="1"/>
  <text x="950" y="206" font-size="12"><tspan text-decoration="underline">battle_id</tspan> : INT</text>
  <text x="950" y="222" font-size="12">battle_date : DATE</text>
  <text x="950" y="238" font-size="12">location : VARCHAR(60)</text>
  <text x="950" y="254" font-size="12">result : {challenger, opponent, draw}</text>
  <text x="950" y="280" font-size="12">{challenger_id ≠ opponent_id}</text>

  <!-- ════════════════════════════════════════ -->
  <!--  ASSOCIATION: fights  Battle—Trainer      -->
  <!-- ════════════════════════════════════════ -->
  <!-- challenger -->
  <line x1="940" y1="190" x2="900" y2="90" stroke="#333" stroke-width="1.5"/>
  <text x="905" y="135" font-size="11" fill="#555" font-style="italic">challenger</text>
  <text x="935" y="185" font-size="11" fill="#555">0..*</text>
  <text x="895" y="100" font-size="11" fill="#555">1</text>
  <!-- opponent -->
  <line x1="940" y1="230" x2="900" y2="110" stroke="#333" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="905" y="175" font-size="11" fill="#555" font-style="italic">opponent</text>
  <text x="935" y="225" font-size="11" fill="#555">0..*</text>
  <text x="895" y="120" font-size="11" fill="#555">1</text>

  <!-- ════════════════════════════════════════ -->
  <!--  ASSOCIATION: uses_team  Battle—Team      -->
  <!-- ════════════════════════════════════════ -->
  <line x1="940" y1="270" x2="900" y2="300" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="920" y="295" font-size="10" fill="#555" font-style="italic">uses_team</text>
  <text x="935" y="267" font-size="11" fill="#555">0..*</text>
  <text x="895" y="305" font-size="11" fill="#555">0..1</text>

  <!-- ════════════════════════════════════════ -->
  <!--  LEGEND                                  -->
  <!-- ════════════════════════════════════════ -->
  <rect x="20" y="500" width="280" height="150" rx="6" fill="#fafafa" stroke="#999" stroke-width="1"/>
  <text x="35" y="520" font-weight="bold" font-size="12">Legend</text>
  <line x1="35" y1="535" x2="65" y2="535" stroke="#333" stroke-width="1.5" marker-end="url(#triangle-empty)"/>
  <text x="75" y="539" font-size="11">Inheritance (generalisation)</text>
  <rect x="35" y="548" width="30" height="16" rx="2" fill="#fff3e0" stroke="#333" stroke-width="2"/>
  <text x="75" y="560" font-size="11">Weak entity (double border)</text>
  <path d="M 35 585 C 55 575, 55 595, 65 585" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="75" y="589" font-size="11">Reflexive association</text>
  <rect x="35" y="598" width="30" height="16" rx="2" fill="#f5f5f5" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="75" y="610" font-size="11">Association class / attribute</text>
  <text x="35" y="626" font-size="11" text-decoration="underline">underlined</text>
  <text x="100" y="626" font-size="11">= primary key attribute</text>
  <rect x="35" y="633" width="30" height="16" rx="2" fill="#f3e8fd" stroke="#333" stroke-width="1.5"/>
  <text x="75" y="645" font-size="11">Battle history (fight record)</text>
</svg>
